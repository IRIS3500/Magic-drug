<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> 坩锅坩锅告诉我魔法 </title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
    :root { --primary: #5c37a6; --secondary: #845ef7; --bg: #f3f0fb; --danger: #e74c3c; }
    body { font-family: "Microsoft YaHei", sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; }
    h1 { text-align: center; color: var(--primary); }
    .container { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; align-items: flex-start; }
    .panel { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(92,55,166,0.1); flex: 1; }
    
    .controls { display: flex; gap: 10px; margin-bottom: 15px; background: #faf8ff; padding: 10px; border-radius: 8px; border: 1px solid #e5dbff; }
    select, input, textarea, button { padding: 6px 10px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; }
    button { background: var(--primary); color: #fff; border: none; cursor: pointer; transition: 0.2s; }
    button:hover { background: var(--secondary); }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .remove-btn { background: var(--danger); padding: 4px 8px; font-size: 12px; }

    .item-list { max-height: 800px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .item-card { border: 1px solid #e0d8f0; padding: 12px; border-radius: 8px; transition: 0.2s; }
    .item-card:hover { border-color: var(--secondary); box-shadow: 0 2px 8px rgba(132, 94, 247, 0.15); }
    .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .tag { background: #e5dbff; color: var(--primary); padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-right:5px; display:inline-block; }
    .tag-neg { background: #feebeb; color: #e74c3c; }

    /* ====== 欧式卡牌区域 ====== */
    .card-wrapper { display: flex; flex-direction: column; align-items: center; background: #fdfcf9; border: 2px dashed #d1c8e1; padding: 20px; border-radius: 12px; margin-bottom: 20px; position: relative; }
    .tarot-card {
        width: 260px; height: 380px;
        border-radius: 8px;
        position: relative;
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow: hidden;
        transition: box-shadow 0.2s, background-color 0.2s;
        /* 背景底纹（黑白图）- 由第一高tag决定 */
        background-size: cover;
        background-position: center;
        background-blend-mode: luminosity;
        background-color: #c0a0d0; /* fallback，动态覆盖 */
        border: 6px double #3b3054;
    }

	.tarot-card::before {
	    content: "";
	    position: absolute;
	    top: 0; left: 0;
	    width: 100%; height: 100%;
	    background-color: rgba(255, 255, 255, 0.4);  /* 白色半透明，让黑白图变淡 */
	    /* 也可以改成黑底降饱和度：rgba(0,0,0,0.3) */
	    pointer-events: none;
	    z-index: 2;
	}
    /* 装饰边框层（叠加的边框图片） - 由第二高tag代表色染色 */
    .tarot-card::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        background-blend-mode: multiply;
	opacity: 0.95; 
        pointer-events: none;
        z-index: 3;
        mix-blend-mode: overlay;
        opacity: 0.85;
    }
    /* 底部胶囊和内部信息区提高层级 */
    .card-top, .flask-container, .card-info { z-index: 5; position: relative; }
    
    .card-top { width: 100%; height: 90px; position: relative; z-index: 5; }
    
    /* 两个角圈 */
    .rune-circle {
        width: 45px; height: 45px; border-radius: 50%; border: 3px solid #3b3054;
        position: absolute; top: 10px; display: flex; flex-direction: column;
        align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #1f1b2e;
        box-shadow: inset 0 0 5px rgba(255,255,255,0.8), 0 2px 4px rgba(0,0,0,0.2);
        background-color: rgba(248,243,224,0.88);
        backdrop-filter: blur(4px);
        z-index: 6;
    }
    .rune-circle.left { left: 10px; }
    .rune-circle.right { right: 10px; }
    .rune-circle span { font-size: 16px; margin-top: -3px; }

    /* 烧瓶区域底纹容器：独立底纹图片（由第二高tag代表色调色） */
    .flask-container {
    	border-radius: 0;            /* 移除圆角 */
    	background: url('image/flask_bg.png') no-repeat center / contain;
    	background-size: 300% 300%;
    	background-repeat: no-repeat;
    	background-position: center;
	filter: brightness(1.1);
    }
    .flask-svg { width: 65%; height: auto; display: block; margin: 0 auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
    
    .card-info { width: 90%; text-align: center; margin-top: 15px; border-top: 1px dashed rgba(59,48,84,0.4); padding-top: 10px; background: rgba(255,253,240,0.7); backdrop-filter: blur(5px); border-radius: 16px; margin-bottom: 8px; z-index: 5; }
    .card-title { font-size: 18px; font-weight: bold; color: #2a2342; margin-bottom: 5px; text-shadow: 0 0 3px white; }
    .card-desc { font-size: 12px; color: #2c2440; line-height: 1.4; font-style: italic; font-weight: 500; }

    /* 胶囊词条 */
    .capsule-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; justify-content: center; min-height: 40px; z-index: 5; position: relative; }
    .rune-capsule {
        padding: 6px 16px; border-radius: 24px; font-weight: bold; font-size: 14px;
        color: #1f1b2e; display: flex; align-items: center; gap: 8px; cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid rgba(0,0,0,0.15);
        transition: transform 0.2s, filter 0.2s;
        background-color: rgba(255,250,235,0.92);
        backdrop-filter: blur(2px);
    }
    .rune-capsule:hover { transform: translateY(-3px); filter: brightness(0.98); }
    .rune-capsule span { background: rgba(0,0,0,0.12); padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: bold;}

    /* 悬浮提示 (Ctrl完整查看) */
    #tooltip {
        position: fixed; background: rgba(10, 10, 20, 0.97); backdrop-filter: blur(12px); color: #f0eef7; padding: 14px 18px; border-radius: 24px;
        font-size: 13px; max-width: 310px; pointer-events: none; z-index: 1000; display: none;
        box-shadow: 0 12px 28px rgba(0,0,0,0.5); line-height: 1.5; border-left: 5px solid #f5c542;
        font-family: 'Segoe UI', system-ui;
    }
    .tt-title { font-weight: bold; color: #ffdf8c; margin-bottom: 6px; border-bottom: 1px solid #555; padding-bottom: 3px; font-size: 15px; }
    .tt-stage { color: #b8e1fc; font-size: 12px; margin-top: 5px; border-top: 1px dashed #444; padding-top: 4px; }
    .tt-ctrl-hint { font-size: 11px; color: #aaa; margin-top: 6px; font-style: italic; }

    /* 星星拖尾特效 */
    .star-particle {
        position: absolute; width: 6px; height: 6px; background: radial-gradient(circle, #fff9c4, #ffdf00);
        border-radius: 50%; pointer-events: none; z-index: 999; filter: drop-shadow(0 0 3px gold);
        animation: starFade 0.7s ease-out forwards;
    }
    @keyframes starFade { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.2) rotate(180deg); } }
    .star-particle-big { width: 10px; height: 10px; background: radial-gradient(circle, #ffec80, #ffb347); animation: starFadeBig 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards; }
    @keyframes starFadeBig { 0% { opacity: 0.9; transform: scale(0.6); } 50% { opacity: 1; transform: scale(1.2) rotate(45deg); } 100% { opacity: 0; transform: scale(0.2) rotate(90deg); } }

    .cmd-box { background: #282c34; color: #abb2bf; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 13px; margin-top: 15px; position: relative; }
    .cmd-line { margin: 5px 0; user-select: all; }
    .cmd-copy { position: absolute; right: 10px; top: 10px; background: #61afef; color: #fff; padding: 4px 8px; font-size: 12px; border-radius: 16px; }
    
    .action-buttons { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 15px; width: 100%; }
    .btn-secondary { background: #2d6a4f; transition: 0.2s; }
    .btn-secondary:hover { background: #40916c; transform: translateY(-2px); }
    .btn-clear { background: #9c4d5e; }
    .btn-clear:hover { background: #b56576; transform: translateY(-2px); }
</style>
</head>
<body>

<h1>🧪 坩锅坩锅告诉我魔法 </h1>

<div id="tooltip">
    <div class="tt-title" id="tt-title">词条名</div>
    <div id="tt-desc">描述内容</div>
    <div class="tt-stage" id="tt-stage">阶段详情</div>
    <div class="tt-ctrl-hint" id="tt-hint">💡 按住 Ctrl 键查看完整描述</div>
</div>

<div class="container">
    <div class="panel" style="flex: 1.2;">
        <h2>📦 我的材料库</h2>
        <div class="controls">
            <input type="file" id="upload" accept=".xlsx, .xls" style="width: 200px;"/>
            <select id="filter-rune"><option value="ALL">🔍 全部词条</option></select>
            <select id="sort-order">
                <option value="DESC">⬇️ 优先最高值</option>
                <option value="ASC">⬆️ 优先最低值</option>
            </select>
        </div>
        <div id="status" style="font-size: 13px; color: #666; margin-bottom: 10px;">✨ 请上传《最强游戏王抽卡.xlsx》 ✨</div>
        <div class="item-list" id="inventory"></div>
    </div>

    <div class="panel" style="flex: 1;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 style="margin:0;">👀 预览</h2>
            <div class="action-buttons" style="width: auto;">
                <button id="exportCardBtn" class="btn-secondary rune-capsule">导出卡牌</button>
                <button id="clearCauldronBtn" class="btn-clear rune-capsule">倾倒坩锅</button>
            </div>
        </div>
        
        <div class="card-wrapper" id="starFieldZone">
            <div class="tarot-card" id="magicTarot">
                <div class="card-top">
                    <div class="rune-circle left" id="circle-l"><div id="c-name-l" style="font-size:10px;">空</div><span id="c-val-l">0</span></div>
                    <svg viewBox="0 0 260 90" style="position:absolute; top:0; left:0; z-index:5;">
                        <path id="arch" d="M 60 70 A 70 50 0 0 1 200 70" fill="transparent" />
                        <text width="260" text-anchor="middle" font-size="14" font-family="serif" font-weight="bold" fill="#3b3054" filter="drop-shadow(0 0 2px white)">
                            <textPath href="#arch" startOffset="50%">女巫女巫·魔药</textPath>
                        </text>
                    </svg>
                    <div class="rune-circle right" id="circle-r"><div id="c-name-r" style="font-size:10px;">空</div><span id="c-val-r">0</span></div>
                </div>
                <div class="flask-container" id="flaskContainer">
                    <svg class="flask-svg" viewBox="0 0 100 100" id="potion-flask"></svg>
                </div>
                <div class="card-info">
                    <div class="card-title" id="display-title">未命名的魔药</div>
                    <div class="card-desc" id="display-desc">神秘液体等待命名...</div>
                </div>
            </div>
            <div class="capsule-container" id="capsule-container"><span>✨ 核心词条 ✨</span></div>
            <div style="width:100%; margin-top:15px; display:flex; flex-direction:column; gap:8px;">
                <input type="text" id="potion-name" placeholder="魔药名字..." oninput="updateDetails()">
                <textarea id="potion-desc" placeholder="魔药简介..." rows="2" oninput="updateDetails()"></textarea>
            </div>
        </div>
        <div style="margin-bottom:15px;"><b>当前总浓稠度：<span id="total-density" style="color:var(--primary);">0</span></b></div>
        <h3>🍲 锅中材料</h3>
        <div id="cauldron-items"></div>
        <div class="cmd-box">
            <button class="cmd-copy" onclick="copyCmd()">复制指令</button>
            <div class="cmd-line" id="cmd-1">.魔药炼制 </div>
            <div class="cmd-line" id="cmd-2">魔药命名 |</div>
        </div>
    </div>
</div>

<script>
    // ========== 图片资源配置 ==========
    // 五张黑白底稿 (image文件夹内)
    const BG_TEXTURES = [
        "image/jbys1.png", "image/jbys2.png", "image/jbys3.png", "image/jbys4.png", "image/jbys5.png"
    ];
    // 卡牌装饰边框图片 (用户提供)
    const DECOR_BORDER = "image/card_border_decor.png";
    // 烧瓶区域底纹图片
    const FLASK_BACKGROUND = "image/flask_bg.png";
    
    // 词条规则库与颜色
    const RUNE_RULES = {
        "通用": { "0-10": "微弱的魔力涟漪，几乎无法察觉" },
        "活力": { "11-20": "治愈小型伤口、常规病痛", "21-30": "将生物复原/维持在最好的状态", ">30": "强烈的圆满，无法自杀之物" },
        "生长": { "11-20": "使停滞的再度生长", "21-30": "真正丰收的喜悦", ">30": "无法控制的蔓延" },
        "本能": { "11-20": "获得其他生命的一些本领", "21-30": "更加强大，更加细致", ">30": "忘记最初的自己" },
        "变形": { "11-20": "总体还是人", "21-30": "开始以假乱真", ">30": "无法变回原样" },
        "通灵": { "11-20": "和常见的幽灵与动物聊天", "21-30": "过去未来留存/迷失的灵体", ">30": "世界变得如此吵闹" },
        "预言": { "11-20": "找到源头/特殊物品", "21-30": "顺着命运丝线找到关联", ">30": "被命运之线缠绕困在原地" },
        "炼金": { "11-20": "微小简单的临时实体", "21-30": "永久固化意象物件", ">30": "未知" },
        "符文": { "11-20": "掌握基础技艺", "21-30": "完全说明固定形象", ">30": "未知" },
        "净化": { "11-20": "清除小范围诅咒", "21-30": "清除中等诅咒", ">30": "未知" },
        "致幻": { "11-20": "简单幻觉", "21-30": "真实庞大幻觉", ">30": "无法逃离" },
        "诅咒": { "11-20": "施加相同灾祸", "21-30": "如影随形", ">30": "突变强大" },
        "伤口": { "11-20": "还能行动", "21-30": "无法行动", ">30": "将近死亡" },
        "镇静": { "11-20": "恢复清明", "21-30": "迟缓/睡眠", ">30": "完全静止" },
        "幸运": { "11-20": "明显好运", "21-30": "最好未来", ">30": "未知" },
        "希望": { "11-20": "明显好运", "21-30": "最好未来", ">30": "未知" },
        "入迷": { "11-20": "吸引注意力", "21-30": "深度沉迷", ">30": "不可自拔" }
    };
    const RUNE_COLORS = {
        "变形":"#AFCEB9","本能":"#D59F98","符文":"#BFD7E6","通灵":"#B7D3D4","活力":"#CDDEA9",
        "净化":"#E5ECFD","致幻":"#F2A4DF","生长":"#F3E1B1","镇静":"#FFFFFF","预言":"#F3E1B1",
        "炼金":"#EEBAA1","希望":"#F5C242","入迷":"#D7BDE2","幸运":"#F5C242","诅咒":"#CCCCCC","伤口":"#CCCCCC"
    };
    const RUNE_NAMES = Object.keys(RUNE_COLORS);
    const FLASK_PATHS = [
        "M45 15 L45 40 A30 30 0 1 0 55 40 L55 15 Z",
        "M45 15 L45 35 L20 80 A5 5 0 0 0 25 90 L75 90 A5 5 0 0 0 80 80 L55 35 L55 15 Z",
        "M40 15 L40 30 L25 40 L25 85 A5 5 0 0 0 30 90 L70 90 A5 5 0 0 0 75 85 L75 40 L60 30 L60 15 Z"
    ];
    let currentFlaskIndex = 0, currentBgIndex = 0;
    let allMaterials = [], filteredMaterials = [], cauldron = [];
    const filterSelect = document.getElementById('filter-rune'), sortSelect = document.getElementById('sort-order');
    const uploadInput = document.getElementById('upload'), statusDiv = document.getElementById('status');
    RUNE_NAMES.forEach(r => filterSelect.add(new Option(r, r)));
    
    // 辅助: 获取词条完整描述
    function getFullDesc(rune, val) {
        if(!rune || rune==="空") return {desc:"无", stage:"虚空"};
        if(val<=10) return {desc:RUNE_RULES["通用"]["0-10"], stage:"✨微效阶段(0-10)"};
        let rl = RUNE_RULES[rune];
        if(!rl) return {desc:"神秘异变", stage:"?"};
        if(val<=20) return {desc:rl["11-20"]||"显效", stage:"🌙显效(11-20)"};
        if(val<=30) return {desc:rl["21-30"]||"强效", stage:"☀️强效(21-30)"};
        return {desc:rl[">30"]||"超载", stage:"⚡超载(>30)"};
    }
    
    // Ctrl 交互
    let ctrlPressed = false;
    window.addEventListener('keydown', (e) => { if(e.ctrlKey) ctrlPressed=true; });
    window.addEventListener('keyup', (e) => { if(e.key === 'Control') ctrlPressed=false; });
    window.showTooltipSmart = function(rune, val, e) {
        const full = getFullDesc(rune, val);
        let descText = full.desc;
        if(!ctrlPressed) descText = descText.length>30 ? descText.substring(0,30)+"…" : descText;
        document.getElementById('tt-title').innerHTML = `⚗️ ${rune} (${val})`;
        document.getElementById('tt-desc').innerHTML = descText;
        document.getElementById('tt-stage').innerHTML = full.stage;
        document.getElementById('tt-hint').innerHTML = ctrlPressed ? "✨ 完整神秘学解析 ✨" : "🔮 按住 Ctrl 查看完整描述";
        const tip = document.getElementById('tooltip');
        tip.style.display = "block";
        moveTip(e);
    };
    window.hideTooltip = () => document.getElementById('tooltip').style.display = "none";
    window.moveTip = (e) => { let tip=document.getElementById('tooltip'); tip.style.left=(e.pageX+15)+'px'; tip.style.top=(e.pageY+15)+'px'; };
    
    // 星星特效
    const tarotCard = document.getElementById('magicTarot');
    let starThrottle = false;
    function createStar(e, big=false) {
        const rect = tarotCard.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top;
        if(x<0 || x>rect.width || y<0 || y>rect.height) return;
        const star = document.createElement('div');
        star.className = 'star-particle' + (big ? ' star-particle-big' : '');
        star.style.left = (x-5)+'px'; star.style.top = (y-5)+'px'; star.style.position = 'absolute';
        tarotCard.appendChild(star);
        setTimeout(()=>star.remove(),700);
    }
    tarotCard.addEventListener('mousemove', (e)=>{ if(starThrottle) return; starThrottle=true; createStar(e, Math.random()>0.7); setTimeout(()=>starThrottle=false,50); });
    
    // 上传Excel (健壮解析)
    uploadInput.addEventListener('click',()=>uploadInput.value=null);
    uploadInput.addEventListener('change', function(e) {
        const file=e.target.files[0]; if(!file) return;
        statusDiv.innerHTML="✨ 解析药典...";
        const reader=new FileReader();
        reader.onload=function(evt){
            try{
                const data=new Uint8Array(evt.target.result);
                const workbook=XLSX.read(data,{type:'array'});
                let foundRow=-1,headers=[],rawRows=[];
                for(let s=0;s<workbook.SheetNames.length;s++){
                    const sheet=workbook.Sheets[workbook.SheetNames[s]];
                    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:""});
                    for(let i=0;i<Math.min(rows.length,35);i++){
                        const row=rows[i];
                        if(!row) continue;
                        const strRow=row.map(c=>String(c||"").trim());
                        if(strRow.some(c=>c.includes("名字")||c.includes("名称")) && strRow.some(c=>c.includes("浓稠"))){
                            foundRow=i; headers=strRow; rawRows=rows; break;
                        }
                    } if(foundRow!==-1) break;
                }
                if(foundRow===-1) throw new Error("无表头");
                let nameCol=headers.findIndex(h=>h.includes("名字")||h.includes("名称"));
                let denseCol=headers.findIndex(h=>h.includes("浓稠"));
                let runeMap={};
                RUNE_NAMES.forEach(r=>{let idx=headers.findIndex(h=>h===r||h.includes(r)); if(idx!==-1) runeMap[r]=idx;});
                let materials=[];
                for(let i=foundRow+1;i<rawRows.length;i++){
                    let row=rawRows[i]; if(!row) continue;
                    let name=String(row[nameCol]||"").trim(); if(!name) continue;
                    let dens=parseInt(row[denseCol])||0;
                    let runes={};
                    for(let [rk,ci] of Object.entries(runeMap)){ let v=parseInt(row[ci]); if(!isNaN(v)&&v!==0) runes[rk]=v;}
                    materials.push({id:`mat_${Date.now()}_${i}`,name,density:dens,runes});
                }
                if(!materials.length) throw new Error("无有效");
                allMaterials=materials; cauldron=[];
                statusDiv.innerHTML=`✅ 导入 ${allMaterials.length} 种材料`;
                applyFilter(); updateSystem();
            }catch(err){ statusDiv.innerHTML="❌ 读取失败"; console.error(err);}
        };
        reader.readAsArrayBuffer(file);
    });
    
    function applyFilter(){
        let filtered=[...allMaterials];
        let ft=filterSelect.value;
        if(ft!=="ALL") filtered=filtered.filter(m=>(m.runes[ft]||0)!==0).sort((a,b)=>(sortSelect.value==="DESC"? (b.runes[ft]||0)-(a.runes[ft]||0):(a.runes[ft]||0)-(b.runes[ft]||0)));
        else filtered.sort((a,b)=>sortSelect.value==="DESC"? b.density-a.density:a.density-b.density);
        filteredMaterials=filtered; renderInventory();
    }
    function renderInventory(){
        const inv=document.getElementById('inventory'); inv.innerHTML="";
        filteredMaterials.forEach(m=>{
            let inC=cauldron.some(c=>c.id===m.id);
            let tags=Object.entries(m.runes).map(([k,v])=>`<span class="tag">${k}:${v>0?'+'+v:v}</span>`).join('');
            inv.innerHTML+=`<div class="item-card"><div class="item-header"><span><b>${escapeHtml(m.name)}</b> <small>(浓稠:${m.density})</small></span><button ${inC?"disabled":""} onclick="addToCauldron('${m.id}')">${inC?"已放入":"加入"}</button></div><div>${tags}</div></div>`;
        });
    }
    function escapeHtml(s){ return String(s).replace(/[&<>]/g,function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
    window.addToCauldron=function(id){
        let m=allMaterials.find(m=>m.id===id);
        if(m && !cauldron.some(c=>c.id===id)){
            if(cauldron.length===0){ currentFlaskIndex=Math.floor(Math.random()*FLASK_PATHS.length); currentBgIndex=Math.floor(Math.random()*BG_TEXTURES.length); }
            cauldron.push(JSON.parse(JSON.stringify(m))); updateSystem();
        }
    };
    window.removeFromCauldron=function(idx){ cauldron.splice(idx,1); updateSystem(); };
    document.getElementById('clearCauldronBtn').onclick=()=>{ cauldron=[]; updateSystem(); };
    
    // 颜色混合 (辅助)
    function mixColors(hex1,hex2){
        if(!hex1&&!hex2) return "#b084cc";
        if(!hex1) return hex2; if(!hex2) return hex1;
        let r1=parseInt(hex1.slice(1,3),16),g1=parseInt(hex1.slice(3,5),16),b1=parseInt(hex1.slice(5,7),16);
        let r2=parseInt(hex2.slice(1,3),16),g2=parseInt(hex2.slice(3,5),16),b2=parseInt(hex2.slice(5,7),16);
        return `#${((1<<24)+(Math.min(255,(r1+r2)/2+12)<<16)+(Math.min(255,(g1+g2)/2+12)<<8)+Math.min(255,(b1+b2)/2+12)).toString(16).slice(1)}`;
    }
    
    // 核心更新：根据前三高tag确定主色、第二高tag确定边框/烧瓶底纹色
    function updateSystem(){
        renderInventory();
        let totalDensity=0, agg={};
        cauldron.forEach(m=>{ totalDensity+=m.density; Object.entries(m.runes).forEach(([k,v])=>agg[k]=(agg[k]||0)+v); });
        document.getElementById('total-density').innerText=totalDensity;
        let cauldDiv=document.getElementById('cauldron-items'); cauldDiv.innerHTML="";
        cauldron.forEach((m,idx)=>{ cauldDiv.innerHTML+=`<div style="display:flex;justify-content:space-between;"><span>${escapeHtml(m.name)}</span><button class="remove-btn" onclick="removeFromCauldron(${idx})">拿出</button></div>`; });
        
        let sorted=Object.entries(agg).map(([n,v])=>({name:n,val:v})).filter(r=>r.val!==0).sort((a,b)=>b.val-a.val);
        let top1=sorted[0]||{name:"空",val:0}, top2=sorted[1]||{name:"空",val:0}, top3=sorted[2]||{name:"空",val:0};
        document.getElementById('c-name-l').innerText=top1.name; document.getElementById('c-val-l').innerText=top1.val;
        document.getElementById('circle-l').style.background=RUNE_COLORS[top1.name]||"#f8f3e0";
        document.getElementById('c-name-r').innerText=top2.name; document.getElementById('c-val-r').innerText=top2.val;
        document.getElementById('circle-r').style.background=RUNE_COLORS[top2.name]||"#f8f3e0";
        
        // 胶囊区
        let capDiv=document.getElementById('capsule-container'); capDiv.innerHTML="";
        if(cauldron.length===0) capDiv.innerHTML="<span>✨ 加入材料显示核心词条 ✨</span>";
        else if(sorted.length===0) capDiv.innerHTML="<span>⚡ 无显著词条 ⚡</span>";
        else{
            let showList=sorted.filter((_,idx)=>idx<3||_.val>10);
            showList.forEach(r=>{ let bg=RUNE_COLORS[r.name]||"#ddd"; capDiv.innerHTML+=`<div class="rune-capsule" style="background-color:${bg};" onmouseenter="showTooltipSmart('${r.name}',${r.val},event)" onmouseleave="hideTooltip()" onmousemove="moveTip(event)">${r.name}<span>${r.val}</span></div>`;});
        }
        // 获取代表色
        let primaryColor = RUNE_COLORS[top1.name] || "#a07dce";    // 第一高主色 (背景底纹映射)
        let secondaryColor = RUNE_COLORS[top2.name] || "#cdb0f0";  // 第二高 (边框&烧瓶底纹)
        
        // 1. 卡牌背景底纹 + 渐变映射 (第一高tag主导)
        const cardEl = document.getElementById('magicTarot');
        if(BG_TEXTURES[currentBgIndex]) cardEl.style.backgroundImage = `url(${BG_TEXTURES[currentBgIndex]})`;
        cardEl.style.backgroundColor = primaryColor;
        cardEl.style.backgroundBlendMode = "luminosity";
        cardEl.style.backgroundSize = "cover";
        
        // 2. 装饰边框 (第二高tag染色) 通过伪元素背景图+混合模式
        let style = document.createElement('style');
        style.id = "dynamicBorderStyle";
        let oldStyle = document.getElementById('dynamicBorderStyle');
        if(oldStyle) oldStyle.remove();
        style.id = "dynamicBorderStyle";
        style.innerHTML = `#magicTarot::after { content:""; background-image: url(${DECOR_BORDER}); background-size: cover; background-position: center; background-color: ${secondaryColor}; background-blend-mode: overlay; opacity:0.85; }`;
        document.head.appendChild(style);
        
        // 3. 烧瓶区域底纹 (第二高tag代表色)
        const flaskBgDiv = document.getElementById('flaskContainer');
        flaskBgDiv.style.backgroundSize = "contain";
        flaskBgDiv.style.backgroundRepeat = "no-repeat";
        
        // 液体动态生成 (颜色取前二混合，或者top3增加神韵)
        let liquidColor = mixColors(primaryColor, secondaryColor);
        let percent = Math.min(85, Math.max(15, 35 + totalDensity/2.5));
        let clipY = 100 - percent;
        let svg = document.getElementById('potion-flask');
        let pathD = FLASK_PATHS[currentFlaskIndex];
        svg.innerHTML = `<defs><linearGradient id="liqGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${liquidColor}" stop-opacity="0.95"/><stop offset="100%" stop-color="${liquidColor}" stop-opacity="0.4"/></linearGradient><filter id="bright"><feComponentTransfer><feFuncR type="linear" slope="1.15"/><feFuncG type="linear" slope="1.12"/><feFuncB type="linear" slope="1.08"/></feComponentTransfer></filter><clipPath id="liqClip"><rect x="0" y="${clipY}" width="100" height="100"/></clipPath></defs><path d="${pathD}" fill="#f9efdf" stroke="#2c1e3f" stroke-width="2"/><path d="${pathD}" fill="url(#liqGrad)" clip-path="url(#liqClip)" filter="url(#bright)"/><path d="${pathD}" fill="none" stroke="rgba(255,245,200,0.6)" stroke-width="2.5"/><ellipse cx="50" cy="${clipY+2}" rx="20" ry="4" fill="rgba(255,250,200,0.7)"/>`;
        
        updateDetails();
    }
    
    function updateDetails(){
        let name=document.getElementById('potion-name').value.trim()||"未名魔药";
        let desc=document.getElementById('potion-desc').value.trim()||"沉睡的秘酿...";
        document.getElementById('display-title').innerText=name;
        document.getElementById('display-desc').innerText=desc;
        let matStr=cauldron.map(m=>m.name).join('、');
        document.getElementById('cmd-1').innerText=cauldron.length?`.魔药炼制 ${matStr}`:".魔药炼制 ";
        document.getElementById('cmd-2').innerText=`魔药命名 ${name}|${desc}`;
    }
    window.copyCmd=()=>{ let cmd=document.getElementById('cmd-1').innerText+" "+document.getElementById('cmd-2').innerText; navigator.clipboard.writeText(cmd).then(()=>alert("✅复制成功")).catch(()=>{let ta=document.createElement('textarea'); ta.value=cmd; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); alert("复制成功");}); };
    document.getElementById('exportCardBtn').addEventListener('click', async()=>{ let canvas=await html2canvas(document.getElementById('magicTarot'),{scale:3,backgroundColor:null}); let a=document.createElement('a'); a.download=`witch_potion_${Date.now()}.png`; a.href=canvas.toDataURL(); a.click(); });
    filterSelect.addEventListener('change',applyFilter); sortSelect.addEventListener('change',applyFilter);
    applyFilter(); updateSystem();
</script>
</body>
</html>
